<!DOCTYPE html>
<html>
<head>
<title>Cloud Hosting Engine</title>
</head>

<body>

<h2>My Cloud Hosting Engine</h2>

<input id="fileid" placeholder="Enter Google Drive File ID">
<button onclick="loadSite()">Load Website</button>

<br><br>

<iframe id="viewer" width="100%" height="600"></iframe>

<script>

function loadSite(){

let id = document.getElementById("fileid").value;

let url = "https://drive.google.com/file/d/" + id + "/preview";

document.getElementById("viewer").src = url;

}

</script>

</body>
</html>
